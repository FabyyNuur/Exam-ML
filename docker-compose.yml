services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
