services:
  - type: web
    name: exam-ml-api
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
      plotly_get_chrome
      python scripts/create_ci_models.py
      python scripts/export_analytics.py
    startCommand: uvicorn mlops.api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    buildFilter:
      paths:
        - mlops/**
        - src/**
        - scripts/**
        - requirements.txt
        - data/raw/**
        - models/metadata.json
        - reports/analytics/**
        - reports/figures/**
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: CORS_ORIGINS
        value: "https://exam-ml-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173"

  - type: web
    name: exam-ml-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: VITE_API_URL
        value: https://exam-ml-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
