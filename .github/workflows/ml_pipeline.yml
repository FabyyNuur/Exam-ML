name: ML Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linters
        run: pip install flake8 black isort
      - name: Check formatting (black)
        run: black --check src/ mlops/
      - name: Check imports (isort)
        run: isort --check-only src/ mlops/
      - name: Lint (flake8)
        run: flake8 src/ mlops/ --max-line-length=100 --ignore=E203,W503

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install pandas numpy scikit-learn xgboost lightgbm imbalanced-learn
      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  validate-data:
    name: Data Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install pandas numpy
      - name: Validate data_cluster.csv schema
        run: |
          python -c "
          import pandas as pd, sys
          df = pd.read_csv('data/raw/data_cluster.csv', sep=None, engine='python')
          required = ['Income', 'Year_Birth', 'Education', 'Marital_Status']
          missing = set(required) - set(df.columns)
          if missing:
              print(f'ERREUR : colonnes manquantes {missing}')
              sys.exit(1)
          print(f'OK : {df.shape[0]} lignes, {df.shape[1]} colonnes')
          "

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, validate-data]
    steps:
      - uses: actions/checkout@v4
      - name: Create dummy models dir
        run: mkdir -p models
      - name: Build Docker image
        run: docker build -f mlops/Dockerfile -t ml-api:${{ github.sha }} .
      - name: Test API startup
        run: |
          docker run -d --name test-api -p 8000:8000 ml-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-api && exit 1)
          docker stop test-api
