name: ML Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linters
        run: pip install black isort flake8
      - name: Check formatting (black)
        run: black --check src/ mlops/
      - name: Check imports (isort)
        run: isort --check-only src/ mlops/
      - name: Lint (flake8)
        run: flake8 src/ mlops/ --max-line-length=100 --ignore=E203,W503

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "pytest>=8.3.0" "httpx>=0.27.0"
      - name: Create CI model artifacts
        run: python scripts/create_ci_models.py
      - name: Export analytics for API tests
        run: python scripts/export_analytics.py
      - name: Run tests
        run: pytest tests/ -v

  validate-data:
    name: Data Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install pandas numpy
      - name: Validate data_cluster.csv schema
        run: |
          python -c "
          import pandas as pd, sys
          df = pd.read_csv('data/raw/data_cluster.csv', sep=None, engine='python')
          required = ['Income', 'Year_Birth', 'Education', 'Marital_Status']
          missing = set(required) - set(df.columns)
          if missing:
              print(f'ERREUR : colonnes manquantes {missing}')
              sys.exit(1)
          print(f'OK : {df.shape[0]} lignes, {df.shape[1]} colonnes')
          "
