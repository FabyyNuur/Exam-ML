version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: mlops/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns

  dashboard:
    image: python:3.10-slim
    ports:
      - "8501:8501"
    volumes:
      - ..:/app
    working_dir: /app
    command: >
      bash -c "pip install streamlit plotly pandas scikit-learn -q &&
               streamlit run mlops/dashboard.py --server.port 8501 --server.address 0.0.0.0"
    depends_on:
      - api
